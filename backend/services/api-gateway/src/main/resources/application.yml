server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

# Rutas estáticas — sin service discovery (ver ADR-0003). En Docker Compose los nombres de
# servicio resuelven por DNS interno; en local, cada uno corre en su puerto de siempre.
cesartravel:
  services:
    auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    property-service-url: ${PROPERTY_SERVICE_URL:http://localhost:8082}
    booking-service-url: ${BOOKING_SERVICE_URL:http://localhost:8083}
    chat-service-url: ${CHAT_SERVICE_URL:http://localhost:8085}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
