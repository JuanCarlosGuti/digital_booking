server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:mysql://${CHAT_DB_HOST:localhost}:${CHAT_DB_PORT:3306}/${CHAT_DB_NAME:chat_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${CHAT_DB_USER:chat_service}
    password: ${CHAT_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

# Mismo secreto que auth-service (JWT_SECRET) — acá solo se usa para validar, nunca para firmar.
cesartravel:
  jwt:
    secret: ${JWT_SECRET}
  property-service:
    base-url: ${PROPERTY_SERVICE_URL:http://localhost:8082}
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
