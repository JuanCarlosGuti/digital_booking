server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notification-service

  # SMTP simple (ver ADR-0006) — con Gmail usar un "app password", nunca la contraseña real.
  # Si las variables quedan vacías el envío falla y se loguea; la reserva no se ve afectada
  # (best-effort por diseño, ver ADR-0002).
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cesartravel:
  mail:
    from: ${MAIL_FROM:no-reply@cesartravel.co}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      # El healthcheck de mail intenta conectarse al SMTP — sin credenciales configuradas
      # tumbaría el health del servicio entero, así que se excluye del estado agregado.
  health:
    mail:
      enabled: false
