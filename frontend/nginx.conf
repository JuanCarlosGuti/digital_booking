server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Upload de imágenes: hasta 5 archivos de 8MB por request (ver property-service).
    client_max_body_size 45m;

    # SPA: cualquier ruta que no sea un archivo real cae a index.html (react-router
    # resuelve la ruta del lado del cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy same-origin hacia el gateway: en producción el navegador llama a /api/... en el
    # mismo origen (VITE_API_URL vacía, ver docker-compose.prod.yml) y nginx reenvía por la
    # red interna de compose — el único puerto público de la VM es el 80 y el CORS deja de
    # ser necesario. En desarrollo no molesta: el frontend le pega directo a localhost:8080.
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # El tráfico que pasa por acá es same-origin por definición (página y API salen del
        # mismo dominio), así que se quita el header Origin para que el filtro CORS del
        # gateway no rechace los POST cuando la app se sirve desde un dominio que no está
        # en su lista (túnel de Cloudflare, IP pública de la VM, etc.).
        proxy_set_header Origin "";
    }

    # Imágenes subidas (property-service las sirve vía gateway, ver ADR-0005).
    location /uploads/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
