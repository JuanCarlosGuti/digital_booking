# CI para el stack de microservicios (el pipeline anterior compilaba el monolito
# backend-integrador con JDK 17 y lo subía por SCP a un EC2 — ambos ya no existen).
# El deploy con imágenes Docker queda pendiente para la fase 3 (ver docs/ROADMAP.md).

stages:
  - build

# Un job por servicio, usando el wrapper de Maven del propio servicio (Java 25).
.backend-service:
  image: eclipse-temurin:25-jdk
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/services/**/*
  script:
    - cd backend/services/$SERVICE
    - chmod +x mvnw
    - ./mvnw -B clean verify
  cache:
    key: maven-repo
    paths:
      - .m2/repository
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

build-auth-service:
  extends: .backend-service
  variables:
    SERVICE: auth-service

build-property-service:
  extends: .backend-service
  variables:
    SERVICE: property-service

build-booking-service:
  extends: .backend-service
  variables:
    SERVICE: booking-service

build-notification-service:
  extends: .backend-service
  variables:
    SERVICE: notification-service

build-api-gateway:
  extends: .backend-service
  variables:
    SERVICE: api-gateway

build-frontend:
  image: node:22-alpine
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*
  script:
    - cd frontend
    - npm ci || npm install
    - npx vitest run
    - npm run build
  artifacts:
    paths:
      - frontend/build
